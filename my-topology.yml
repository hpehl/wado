name: my-topology
version: 39
hosts:
  - name: dc
    domain-controller: true
  - servers:
      - name: server-one
        group: main-server-group
        auto-start: true
      - name: server-two
        group: main-server-group
        offset: 10
      - name: server-three
        group: other-server-group
        offset: 20
      - name: server-four
        group: other-server-group
        offset: 30
  - name: host
    servers:
      - name: server-one
        group: main-server-group
      - name: server-two
        group: other-server-group
      - name: server-three
        group: other-server-group
  - version: 38
    servers:
      - name: server-one
        group: main-server-group
      - name: server-two
        group: main-server-group
      - name: server-three
        group: other-server-group
